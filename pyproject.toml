[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle
    "F",   # pyflakes
    "I",   # isort
    "B",   # bugbear
]
ignore = [
    "E501",  # line too long (black lo maneja)
]

[tool.ruff.format]
quote-style = "double"